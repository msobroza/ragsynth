# ragsynth v2 real-benchmark config: LegalBench-RAG (schema v2, spec01 §8).
# The four sub-corpora (CUAD/ContractNLI/MAUD/PrivacyQA) are ONE merged corpus
# with metadata.subcorpus on every chunk/query (D36); split_stratify_by:
# subcorpus stratifies the 60/25/15 split per sub-corpus. Heterogeneous
# sub-corpora => strong cluster imbalance, so the D37 ladder is expected to
# settle at C=2-4 (runtime concern, out of scope here). See configs/v2_fiqa.yaml
# header for the embedder / judge-structure rationale.
ragsynth: {schema_version: 2, name: v2-legalbench-rag, seed: 0}
resources:
  dataset:
    type: jsonl
    params:
      chunks_path: data/benchmarks/legalbench_rag/chunks.jsonl
      queries_path: data/benchmarks/legalbench_rag/queries.jsonl
      anchor_qrels_path: data/benchmarks/legalbench_rag/anchor_qrels.jsonl
      split_stratify_by: subcorpus
  embedder:
    type: cached_chroma
    params:
      dataset: legalbench_rag
      path: data/embeddings/chroma
      backend:
        type: gemini
        params: {model: gemini-embedding-2, output_dimensionality: 768,
                 api_key_env: GEMINI_API_KEY, batch_size: 100}
  generator_llm:
    type: cached
    params:
      mode: record            # replay for reruns
      transcript_path: data/benchmarks/legalbench_rag/transcripts/generator.jsonl
      backend: {type: openai_compatible,
                params: {base_url: "${RAGSYNTH_LLM_BASE_URL}", model: Qwen/Qwen2.5-7B-Instruct,
                         api_key_env: RAGSYNTH_LLM_API_KEY, temperature: 0.7}}
  judge_llm:
    type: llm
    params:
      prompt_version: judge_v1
      chat:
        type: cached
        params:
          mode: record
          transcript_path: data/benchmarks/legalbench_rag/transcripts/judge.jsonl
          backend: {type: openai_compatible,
                    params: {base_url: "${RAGSYNTH_LLM_BASE_URL}",
                             model: meta-llama/Llama-3.1-8B-Instruct,
                             api_key_env: RAGSYNTH_LLM_API_KEY, temperature: 0.0}}
  retriever: {type: dense_inmemory}
  partition: {n_clusters: 8, ladder: {candidates: [8, 6, 4, 2], min_per_side: 30}}   # D37
  demand: {n_components: 8, lam: 0.7, tau_r_pct: 5.0}
artifacts_dir: experiments/v2_legalbench_rag/artifacts
pipeline:
  - {type: seed_sampler.quota, params: {lam: 0.7, n_min: 3, n_seeds: 240, p_group: 0.2}}
  - {type: context_assembler, params: {k_style: 3}}
  - {type: generator, params: {n_candidates: 2, prompt_version: answer_first_v1}}
  - {type: gate, params: {checks: [dedup, zero_context, answerability, round_trip, uniqueness],
                          dedup: {cos_threshold: 0.95}, round_trip: {k: 10},
                          uniqueness: {mode: promote, top_m: 3}}}
  - {type: qrel_builder, params: {strategy: binary}}
  - {type: curator, params: {memorization_cos: 0.9}}
  - {type: validator, params: {arms: [a0, a1, a2, oracle], n_boot: 1000, n_per_arm: 160,
                               reuse_pipeline_for: a1, gates: {tau: 0.9, tau_ap: 0.8},
                               audit_export: {n: 160, arm: a2, stratify: [cluster, stratum]},
                               arm_params: {oracle: {n_records: 160}}}}
